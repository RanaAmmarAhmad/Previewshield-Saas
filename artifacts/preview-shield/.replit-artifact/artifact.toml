kind = "web"
previewPath = "/"
title = "PreviewShield"
version = "1.0.0"
id = "artifacts/preview-shield"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 18215

[services.development]
run = "pnpm --filter @workspace/preview-shield run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/preview-shield", "run", "build" ]
publicDir = "artifacts/preview-shield/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "18215"
BASE_PATH = "/"
