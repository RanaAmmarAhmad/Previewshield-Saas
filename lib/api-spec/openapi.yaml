openapi: 3.1.0
info:
  title: Api
  version: 0.1.0
  description: PreviewShield API - Secure file preview sharing platform
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
  - name: previews
  - name: visits
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /previews:
    post:
      operationId: createPreview
      tags: [previews]
      summary: Create a new preview
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreatePreviewRequest"
      responses:
        "201":
          description: Preview created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Preview"
        "400":
          description: Invalid input
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /previews/{id}:
    get:
      operationId: getPreview
      tags: [previews]
      summary: Get a preview by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
        - name: password
          in: query
          required: false
          schema:
            type: string
      responses:
        "200":
          description: Preview found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PreviewPublic"
        "401":
          description: Password required or incorrect
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Preview not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "410":
          description: Preview expired and deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /previews/{id}/visit:
    post:
      operationId: recordVisit
      tags: [visits]
      summary: Record a client visit
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RecordVisitRequest"
      responses:
        "200":
          description: Visit recorded
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VisitRecorded"
        "404":
          description: Preview not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /previews/{id}/visits:
    get:
      operationId: getPreviewVisits
      tags: [visits]
      summary: Get all visits for a preview
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
        - name: ownerToken
          in: query
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Visits list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VisitsList"
        "403":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /previews/{id}/stats:
    get:
      operationId: getPreviewStats
      tags: [previews]
      summary: Get preview statistics
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
        - name: ownerToken
          in: query
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PreviewStats"
        "403":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required: [status]

    CreatePreviewRequest:
      type: object
      properties:
        freelancerName:
          type: string
        agencyName:
          type: string
          nullable: true
        fileName:
          type: string
        fileType:
          type: string
          enum: [image, pdf, video]
        fileMimeType:
          type: string
        fileSize:
          type: integer
        password:
          type: string
          nullable: true
        fileUrl:
          type: string
          nullable: true
        expiresInHours:
          type: integer
          nullable: true
          description: "Hours until expiry. null = never. Default = 24."
      required:
        - freelancerName
        - fileName
        - fileType
        - fileMimeType
        - fileSize

    Preview:
      type: object
      properties:
        id:
          type: string
        freelancerName:
          type: string
        agencyName:
          type: string
          nullable: true
        fileName:
          type: string
        fileType:
          type: string
        fileMimeType:
          type: string
        fileSize:
          type: integer
        hasPassword:
          type: boolean
        previewUrl:
          type: string
        ownerToken:
          type: string
        createdAt:
          type: string
          format: date-time
        expiresAt:
          type: string
          format: date-time
          nullable: true
      required:
        - id
        - freelancerName
        - fileName
        - fileType
        - fileMimeType
        - fileSize
        - hasPassword
        - previewUrl
        - ownerToken
        - createdAt

    PreviewPublic:
      type: object
      properties:
        id:
          type: string
        freelancerName:
          type: string
        agencyName:
          type: string
          nullable: true
        fileName:
          type: string
        fileType:
          type: string
        fileMimeType:
          type: string
        fileSize:
          type: integer
        hasPassword:
          type: boolean
        streamToken:
          type: string
          description: Short-lived HMAC token for accessing the file stream
        createdAt:
          type: string
          format: date-time
        expiresAt:
          type: string
          format: date-time
          nullable: true
      required:
        - id
        - freelancerName
        - fileName
        - fileType
        - fileMimeType
        - fileSize
        - hasPassword
        - streamToken
        - createdAt

    RecordVisitRequest:
      type: object
      properties:
        clientName:
          type: string
          nullable: true
        userAgent:
          type: string
          nullable: true
        referrer:
          type: string
          nullable: true

    VisitRecorded:
      type: object
      properties:
        success:
          type: boolean
        visitId:
          type: string
      required: [success, visitId]

    VisitsList:
      type: object
      properties:
        visits:
          type: array
          items:
            $ref: "#/components/schemas/Visit"
        total:
          type: integer
      required: [visits, total]

    Visit:
      type: object
      properties:
        id:
          type: string
        previewId:
          type: string
        clientName:
          type: string
          nullable: true
        ipAddress:
          type: string
          nullable: true
        userAgent:
          type: string
          nullable: true
        referrer:
          type: string
          nullable: true
        visitedAt:
          type: string
          format: date-time
      required: [id, previewId, visitedAt]

    PreviewStats:
      type: object
      properties:
        previewId:
          type: string
        totalVisits:
          type: integer
        uniqueIps:
          type: integer
        lastVisitAt:
          type: string
          format: date-time
          nullable: true
        recentVisits:
          type: array
          items:
            $ref: "#/components/schemas/Visit"
      required: [previewId, totalVisits, uniqueIps, recentVisits]

    ErrorResponse:
      type: object
      properties:
        error:
          type: string
        message:
          type: string
      required: [error, message]
